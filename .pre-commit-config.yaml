repos:
  - repo: local
    hooks:
      - id: validate-blocks
        name: Validate data/blocks/*.yaml
        entry: python validateBlocks.py
        language: python
        files: ^data/blocks/.*\.yaml$
        pass_filenames: false
        additional_dependencies: [pyyaml, jsonschema]
      - id: format-blocks
        name: Format scriptBlocks.json
        entry: python formatBlocks.py
        language: python
        files: ^data/blocks/.*\.yaml$
        pass_filenames: false
        always_run: true
        additional_dependencies: [pyyaml]
      - id: generate-docs
        name: Generate API Documentation
        entry: python scripts/generateDocs.py
        language: python
        files: ^data/blocks/.*\.yaml$
        pass_filenames: false
        always_run: false
        additional_dependencies: [pyyaml, m2r]