name: Data validation via schemas

on:
  push:
    branches: [main, dev]
    paths:
      - 'data/blocks/**'
      - 'chores/validateBlocks.py'
  pull_request:
    branches: [main, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
          
      - name: Install dependencies
        run: |
          pip install pyyaml
          pip install jsonschema
          
      - name: Run validateBlocks
        run: python chores/validateBlocks.py
