- name: ExplosionRange
  description: |-
    [FireStartingChance](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-firestartingchance) out of 100 is a chance of the explosion to set on fire tiles and burn characters in the [ExplosionRange](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-explosionrange). A value above 100 means the explosion will always set on fire tiles and burn characters, while a value of 0 means it will never set on fire tiles nor burn characters. Each tiles in the explosion range will run the [FireStartingChance](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-firestartingchance) check independently, so a value of 50 means that on average half of the tiles in the explosion range will be set on fire.

    [SmokeRange](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-smokerange) sets the range of the smoke effect. Squares in this range also can be set on fire individually based on [FireStartingChance](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-firestartingchance).

    [FireRange](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-firerange) will set every tiles in the provided range on fire.

    [FireStartingEnergy](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-firestartingenergy) is an extra check added on top of all of these whenever a fire is attempted to be started. Will set the energy of the fire which impacts how strong is is. A value of 0 means no fire is started. Vegetation tiles provide a net bonus of 50 in energy to the fire being created. The created fire will have a life expectency between 300 and 600 (unclear on the units).

    [ExplosionSound](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-explosionsound) can be used to set the sound played when the explosion happens, while [ExplosionDuration](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-explosionduration) can be used to set the duration of the explosion effect, which is especially useful for smoke bombs.
  needs:
    - name: ItemType
      values:
        - base:weapon
  type:
    main: integer
