- name: Aimingtime
  description: |-
    [Aimingtime](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-aimingtime) is a stat which is directly applied to a [HandWeapon](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/inventory/types/HandWeapon.html) while [AimingTimeModifier](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-aimingtimemodifier) is applied to [weapon parts](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/inventory/types/WeaponPart.html). The attachments directly add or subtract their [AimingTimeModifier](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-aimingtimemodifier) to the aiming delay.

    It controls the aim-settling delay, the aiming delay counter that must tick down to 0 before the weapon is "settled". Lower values means faster target reacquisition after each shots. The primary "how snappy does this gun feel" lever for semi-automatic guns. It tick down the aiming via the following formula:
    ```java
    rate = 0.625 x gameSpeed x (1 + 0.05 x AimingLevel + (Marksman ? 0.1 : 0))
    ```

    The [marksman](https://pzwiki.net/wiki/Marksman) trait being no longer accessible in the recent versions of the game, the condition involving it will never be reached.

    > Note:
    > This formula might not be fully accurate as [time deltas](https://github.com/demiurgeQuantified/PZModdingGuides/blob/main/guides/GameTime.md) don't appear in the formula.

    While `aimingDelay > 0`, both [hit chance](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-hitchance) and [critical chance](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-criticalchance) take an aim-delay penalty proportional to the remaining delay. The countdown only starts after `recoilDelay` has recovered, so high [RecoilDelay](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-recoildelay) directly delays when `AimingTime` begins ticking.

    On each shots or equip, the aiming delay will be increased or reduced, being impacted by aiming while in a [vehicle](https://pzwiki.net/wiki/Vehicle), being reduced by the trait [Dextrous](https://pzwiki.net/wiki/Dextrous) or increased by [All Thumbs](https://pzwiki.net/wiki/All_Thumbs). The following formula is used:
    ```java
    aimingDelay = AimingTime
            * (Dextrous ? 0.8 : AllThumbs ? 1.2 : 1.0)
            * (in vehicle ? 1.5 : 1.0)
    ```
  type:
    main: integer
  needs:
    - name: ItemType
      values:
        - base:weapon
