- name: Tags
  description: |-
    A list of tags to assign to the item. Tags are used by the game to easily identify properties of the items from the Lua or Java. This can notably be used in [craftRecipes](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/craftrecipe.html).

    For example:
    ```cpp
    Tags = base:egg;base:hasmetal,
    ```

    You can find a list of all tags on the [wiki](https://pz-wiki-modding.github.io/PZ-API-Docs/java/item_tags.html). The wiki also provides a list of every items (per full type) associated to tags [here](https://pzwiki.net/wiki/Item_tag).

    To create a custom tag, you have to first create its definition in your mod's [registries](https://pzwiki.net/wiki/Registries). In the `registries.lua` file, define the following by renaming the various elements to fit your mod name, id etc:
    ```lua
    YourModRegistry = {}
    YourModRegistry.YOUR_TAG_NAME = ItemTag.register("yourmodid:yourtagname")
    ```

    You can then use that tag `yourmodid:yourtagname` in your item definition. And you can use the stored ItemTag reference `YourModRegistry.YOUR_TAG_NAME` in your Lua code.
  type:
    main: array
    array:
      type: string
      separator: ;
