- name: MaxSightRange
  itemTypes:
  - weapon
  - weaponpart
  type:
    main: float
  needs:
    - name: ItemType
      values:
        - base:weapon
        - base:weaponpart
  description: |-
    [MinSightRange](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/item.html#item-minsightrange) and [MaxSightRange](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/item.html#item-maxsightrange) define the optimal sight window, to be more specific, the distance band where hits and critical hits bonuses peak.

    The [aiming skill](https://pzwiki.net/wiki/Aiming) and [eagle eyed](https://pzwiki.net/wiki/Eagle_Eyed) will impact these values:
    ```
    effectiveMin = MinSightRange x (1 - AimingLevel / 30)
    effectiveMax = MaxSightRange x (1 + AimingLevel / 30) x (EagleEyed ? 1.2 : 1.0)
    ```

    At aiming 10, the minimum shrinks by 33% and the max grows by 33%, which widens the window significantly. When the trait [Short Sighted](https://pzwiki.net/wiki/Short_Sighted) is present and the character doesn't wear glasses, the `effectiveMax` equals `effectiveMin`, making the entire bonus window disappear.

    Inside the the `effectiveMin` and `effectiveMax` window, the bonus follows a [Gaussian](https://en.wikipedia.org/wiki/Bell-shaped_function) with the bonus peaking at the midpoint. Aim-delay penalty is also reduced inside the window.

    Below `effectiveMin`, a small linear penalty is applied as the gun is not suited for point-blank. Above `effectiveMax`, a growing quadratic penalty is applied, the bonus degrades rapidly past the edge.

    A CQC gun should have a low [MaxSightRange](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/item.html#item-maxsightrange) while a marksman riffle should have a high [MinSightRange](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/item.html#item-minsightrange) with a wide window.
