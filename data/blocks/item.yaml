- name: MaxHitcount
  description: |-
    [MaxHitcount](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-maxhitcount) sets the maximum number of targets the weapon can hit with one attack. For ranged weapons, it will determine how many targets a single shot can hit. For melee weapons, a single swing can hit multiple targets if the relevant sandbox option allows it (Weapon Multi-Hit).

    When [PiercingBullets](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-piercingbullets) is `true`, a shot continues past the first target and registers on collinear targets behind it. Each subsequent pierced target receives reduced damage (`damage / PIERCING_BULLET_DAMAGE_REDUCTION`). Targets must be within approximatively 1 degree of each other in angle to qualify.

    Keep `MaxHitcount` to 1 for a standard rifle, and set it to 2 with [PiercingBullets](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-piercingbullets) to have AP rounds behavior (M16A2 for example).
  needs:
    - name: ItemType
      values:
        - base:weapon
  type:
    main: integer
  default: 1000
- name: MaxItemSize
  itemTypes:
