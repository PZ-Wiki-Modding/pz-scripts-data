    [OnAttach](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-onattach) and [OnDetach](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-ondetach) are used to define a callback function which will be called when the weapon part is attached or detached from the weapon.
