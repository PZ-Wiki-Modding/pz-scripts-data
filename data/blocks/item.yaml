- name: ReplaceOnDeplete
  description: |-
    When providing a [ReplaceOnDeplete](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-replaceondeplete), the moment the item is depleted (e.g. a drainable item has no uses left anymore), it will be replaced by the item defined in this parameter. If this is empty, the item will be deleted without any replacement. This can notably be used to replace towels with a [wet](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-wet) towel.

    [ReplaceOnExtinguish](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-replaceonextinguish) on the other hand is used for [light sources items](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-lightstrength) to swap between the lit and unlit version of the item when it is fully drained.

    [ReplaceOnRotten](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-replaceonrotten) is used for food items to swap to a different rotten version of items when they are fully rotten. This is actually not used to make an item rotten, which is natively handled by the game when providing [DaysFresh](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-daysfresh) and [DaysTotallyRotten](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-daystotallyrotten) but instead when the item isn't necessary bad to eat after the days rotten duration, like ice cream becoming melted for example.

    [ReplaceOnUse](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-replaceonuse) is used whenever an item is used, to replace it with another item. Used for containers containing food items to provide the container back after the food is eaten, or for dirty items getting cleaned.
  type:
    main: block
    block:
      name: item
      fullType: true
