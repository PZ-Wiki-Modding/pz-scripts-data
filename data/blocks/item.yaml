- name: UseDelta
  description: |-
    Used to set the number of [uses](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/inventory/InventoryItem.html#getCurrentUses()) for the item where its durability has a value of `1` when full and `0` when empty. For example, a [base:drainable](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-itemtype) item with a `UseDelta` of `0.03125` (the default value) will have 32 uses ($1/0.03125$) before it is depleted.

    When used for [Clothing items](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-itemtype), the `UseDelta` is used to indicate the amount of durability lost for [oxygen tanks](https://pzwiki.net/wiki/Oxygen_Tank) for items with the [ItemTags](https://pz-wiki-modding.github.io/PZ-API-Docs/java/item_tags.html) `base:scba` or [gas mask filters](https://pzwiki.net/wiki/Gas_Mask_Filter) for items with the ItemTags `base:gasmask`, `base:respirator` or `base:improvisedgasmask`.

    Some food items seem to be using that parameter but it doesn't seem to be used for those anywhere. There's uses for it in the Java for Drainable, Weapon and Radio items, but it doesn't seem to be limited to those.
  type:
    main: float
  default: 0.03125
  needs:
    - name: ItemType
      values:
        - base:drainable
        - base:weapon
        - base:radio
