  description: |-
    For [IsAimedFirearm](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-isaimedfirearm) set to `true`, the ballistics controller handles target detection and does not use [MinAngle](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-minangle) in the ranged hit-chance formula. These serve one narrow purpose: the `isMeleeTargetTooCloseToShoot()` check, detecting if a target is so close it should trigger a melee strike instead of a shot.

    `MinAngle` is a dot-product threshold (-1 to 1). Values near 1.0 mean the target must be almost directly in front to trigger the melee-swap check, while lower values widen the angle.

    [AimingPerkMinAngleModifier](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-aimingperkminanglemodifier) is parsed and stored and impacts the minimum angle with the following formula:
    ```java
    effectiveMinAngle = MinAngle - AimingPerkMinAngleModifier * Aiming level
    ```
  needs:
    - name: ItemType
      values:
        - base:weapon
  type:
    main: float
  default: 1.0
