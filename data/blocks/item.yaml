- name: AmmoType
  description: |-
    [AmmoType](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-ammotype) indicates what ammo is consumed when shooting, but it also determines tracer and hit-reaction sound lookups. The value needs to reference the [registries](https://pzwiki.net/wiki/Registries) entry of the ammo you want to use. The vanilla ammunition types which are available by default are:
    - `base:bullets_3030`
    - `base:bullets_308`
    - `base:bullets_357`
    - `base:bullets_38`
    - `base:bullets_44`
    - `base:bullets_45`
    - `base:bullets_556`
    - `base:bullets_9mm`
    - `base:cap_gun_cap`
    - `base:shotgun_shells`
    
    [AmmoBox](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-ammobox) is used to indicate the type of ammo box associated to the weapon. This is mostly used to spawn this type of ammo box alongside the gun.

    [MagazineType](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-magazinetype) is used to set the magazine item the gun uses. If not provided, then the gun doesn't use a magazine item and loads rounds individually. [MaxAmmo](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-maxammo) is used to set the capacity of either the magazine item or the gun.

    [WeaponReloadType](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-weaponreloadtype) is used to select the reload workflow of the gun. Notably affects rack-after-shot, insertion style and animations. The provided value references the [variable condition](https://pzwiki.net/wiki/Conditions) `WeaponReloadType` in [AnimNodes](https://pzwiki.net/wiki/AnimNodes). The game has the following values available by default:
    - handgun
    - shotgun
    - boltactionnomag
    - boltaction
    - revolver
    - doublebarrelshotgun
    - doublebarrelshotgunsawn

    A custom `WeaponReloadType` can be used if the relevant animations and condition logic are properly set up in a custom [AnimNode](https://pzwiki.net/wiki/AnimNodes).
  needs:
    - name: ItemType
      values:
      - base:weapon
      - base:normal
  type:
    main: string
