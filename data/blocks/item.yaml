- name: StaticModel
  description: |-
    [StaticModel](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-staticmodel) is used to define the model of the item being held in hands. On the other hand, [WorldStaticModel](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-worldstaticmodel) is used to define the model of the item being placed in the world. The two models can be different, for example an item can have a handle that is up when held in hands, but down when placed in the world.

    Alternatively, [StaticModelsByIndex](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-staticmodelsbyindex) and [WorldStaticModelsByIndex](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-worldstaticmodelsbyindex) can be used to define multiple models for the same item definition, which is useful for variants of the same item (e.g. a weapon with different skins). You can use [IconsForTexture](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-iconsfortexture) alongside those to define different icons for each variant. Here's an example usage with three variants of the same item:
    ```cpp
    StaticModelsByIndex = AK47;AK47_Desert;AK47_Woodland,
    WorldStaticModelsByIndex = AK47;AK47_Desert;AK47_Woodland,
    IconsForTexture = AK47;AK47_Desert;AK47_Woodland,
    ```
  type:
    main: block
    block:
      name: model
      fullType: true
