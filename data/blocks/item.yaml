  type:
    main: float
  default: 1.5
  description: |-
    Rolls the hit damage of the weapon between `MinDamage` and `MaxDamage`.
    
    [WeaponParts](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-itemtype) can modify the damage of the weapon with the [DamageModifier](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-damagemodifier) parameter. When equipped, a [WeaponPart](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-itemtype) will increase the minimum and maximum damage of the weapon by the provided value. You are not limited to positive values, you can also add damage debuffs to the weapon by providing negative values.
- name: MaxHitcount
  description: |-
    [MaxHitcount](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-maxhitcount) sets the maximum number of targets the weapon can hit with one attack. For ranged weapons, it will determine how many targets a single shot can hit. For melee weapons, a single swing can hit multiple targets if the relevant sandbox option allows it (Weapon Multi-Hit).

    When [PiercingBullets](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-piercingbullets) is `true`, a shot continues past the first target and registers on collinear targets behind it. Each subsequent pierced target receives reduced damage (`damage / PIERCING_BULLET_DAMAGE_REDUCTION`). Targets must be within approximatively 1 degree of each other in angle to qualify.

    Keep `MaxHitcount` to 1 for a standard rifle, and set it to 2 with [PiercingBullets](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-piercingbullets) to have AP rounds behavior (M16A2 for example).
  needs:
    - name: ItemType
      values:
        - base:weapon
  type:
    main: integer
  default: 1000
- name: MaxItemSize
  itemTypes:
  - container
- name: MaxRange
  description: |-
    [MaxRange](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-maxrange) is a stat which is directly applied to a [HandWeapon](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/inventory/types/HandWeapon.html) while [MaxRangeModifier](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-maxrangemodifier) is applied to [weapon parts](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/inventory/types/WeaponPart.html).

    The [MaxRange](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-maxrange) of a weapon is used to determine the maximum distance the weapon can shoot. Targets beyond `effectiveMaxRange` calculated with the formula below simply can't be reached, the parameter is a hard cutoff, not a penalty in damage or anything like that.
    ```
    effectiveMaxRange = MaxRange + AimingPerkRangeModifier x (AimingLevel / 2.0)
    ```

    All rifles from the base game have a `AimingPerkRangeModifier` of 0, so [aiming level](https://pzwiki.net/wiki/Aiming) has no effect on the range of guns. Set it above 0 to give skilled players extra reach.
  itemTypes:
  - weapon
  type:
    main: float
  default: 1.0
- name: MaxRangeModifier
  "#desc": item/MaxRange
  needs:
    - name: ItemType
      values:
        - base:weaponpart
  type:
    main: float
- name: MaxSightRange
  type:
    main: float
  needs:
    - name: ItemType
      values:
        - base:weapon
        - base:weaponpart
  description: |-
    [MinSightRange](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-minsightrange) and [MaxSightRange](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-maxsightrange) define the optimal sight window, to be more specific, the distance band where hits and critical hits bonuses peak.

    The [aiming skill](https://pzwiki.net/wiki/Aiming) and [eagle eyed](https://pzwiki.net/wiki/Eagle_Eyed) will impact these values:
    ```
    effectiveMin = MinSightRange x (1 - AimingLevel / 30)
    effectiveMax = MaxSightRange x (1 + AimingLevel / 30) x (EagleEyed ? 1.2 : 1.0)
    ```

    At aiming 10, the minimum shrinks by 33% and the max grows by 33%, which widens the window significantly. When the trait [Short Sighted](https://pzwiki.net/wiki/Short_Sighted) is present and the character doesn't wear glasses, the `effectiveMax` equals `effectiveMin`, making the entire bonus window disappear.

    Inside the the `effectiveMin` and `effectiveMax` window, the bonus follows a [Gaussian](https://en.wikipedia.org/wiki/Bell-shaped_function) with the bonus peaking at the midpoint. Aim-delay penalty is also reduced inside the window.

    Below `effectiveMin`, a small linear penalty is applied as the gun is not suited for point-blank. Above `effectiveMax`, a growing quadratic penalty is applied, the bonus degrades rapidly past the edge.

    A CQC gun should have a low [MaxSightRange](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-maxsightrange) while a marksman riffle should have a high [MinSightRange](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-minsightrange) with a wide window.
