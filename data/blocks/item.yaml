- name: HitChance
  description: |-
    [HitChance](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/item.html#item-hitchance) is a stat which is directly applied to a [HandWeapon](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/inventory/types/HandWeapon.html) while [HitChanceModified](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/item.html#item-hitchancemodifier) is applied to [weapon parts](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/inventory/types/WeaponPart.html).

    The initial hitchance is determined by the following configuration:
    ```
    HitChance = min(HitChance, CombatConfigKey.MAXIMUM_START_TO_HIT_CHANCE)
    ```

    [MAXIMUM_START_TO_HIT_CHANCE](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/combat/CombatConfigKey.html#MAXIMUM_START_TO_HIT_CHANCE) is a configuration of the combat system of Project Zomboid. In this case, the default value is `95.0`, which means the initial HitChance cannot be above `95.0`.

    Below is a table listing the different elements which can influence the hit chance of a weapon:
    
    | Element | Type | Description | Formula |
    |---|---|---|---|
    | [AimingPerkHitChanceModifier](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/item.html#item-aimingperkhitchancemodifier) and [aiming skill](https://pzwiki.net/wiki/Aiming) of the character | Weapon parameter | The aiming level of the character impacts the player's hit chance. | `HitChance += AimingPerkHitChanceModifier * Aiming level` |
    | Sight bonus / penalty | Weapon parameter | In the formula, `sightWindowBonus` refers to the bonus from [MinSightRange](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/item.html#item-minsightrange) and [MaxSightRange](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/item.html#item-maxsightrange). `sightlessBonus` on the other hand is a simpler parameter which uses a distance falloff when there is not active sight. The best path is used for the better result. | `HitChance += max(sightlessBonus - sightlessAimDelayPenalty, sightWindowBonus - sightWindowAimDelayPenalty)` |
    | Moodles penalty | Player condition | Being panicked, stressed, tired, drunk or lacking endurance will all negatively impact the `HitChance`. | `HitChance -= moodlesPenalty` |
    | Weather penalty | Environment | Wind, rain, fog, low-light will all negatively impact the `HitChance`. | `HitChance -= weatherPenalty` |
    | Movement penalty | Player condition | The shooter speed and the distance will negatively impact the `HitChance`. | `HitChance -= movementPenalty` |
    | Arm pain penalty | Player condition | The character's level of [pain](https://pzwiki.net/wiki/Pain) will impact its aiming. | `HitChance -= armPainPenalty` |
    | Headgear vision penalty | Player condition | Headgear will impact aiming, if the relevant sandbox option is enabled. | `HitChance -= headgearVisionPenalty` |

    The final obtained value of `HitChance` is clamped against the [MINIMUM_TO_HIT_CHANCE](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/combat/CombatConfigKey.html#MINIMUM_TO_HIT_CHANCE) and [MAXIMUM_TO_HIT_CHANCE](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/combat/CombatConfigKey.html#MAXIMUM_TO_HIT_CHANCE), both respectively equal to `5.0` and `100.0` by default.

    At point-blank range, all combined penalties are scaled toward zero, so close shots are always more forgiving. The [HitChance](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/item.html#item-hitchance) parameter will set the floor for all players while [AimingPerkHitChanceModifier](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/item.html#item-aimingperkhitchancemodifier) will increase accuracy with the level of aiming of the player. Low base and high modifier makes the gun terrible while unskilled but excellent with investment in aiming.
  type:
    main: integer
  needs:
    - name: ItemType
      values:
        - base:weapon
