    Only in `Auto` [fire mode](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-firemode). Drives the full-auto animation cycle rate via the `autoShootSpeed` [animation variable](https://pzwiki.net/wiki/Conditions).

    A higher value means more shots per second. In `Single` mode this field is ignored and shot speed comes from [RecoilDelay](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-recoildelay) and [Aimingtime](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-aimingtime) instead.

    Increase for SMG feel and decrease for heavy LMG feel.
