    The ConsolidateOption value needs to be a translation key which will be passed through [getText](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/core/Translator.html#getText(java.lang.String)) to retrieve the translation value. The vanilla drainables (duct tape, wires, matches...) use the translation key `ContextMenu_Merge` which outputs a text 'Add to'.
