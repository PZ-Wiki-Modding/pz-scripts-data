- name: ExplosionPower
  description: |-
    If set above 0, the explosion will burn tiles and set fire to them based on the provided [fireStartingChance](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-firestartingchance)
  needs:
