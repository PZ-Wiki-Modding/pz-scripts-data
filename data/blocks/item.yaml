version: 1
name: item
description: |-
  The item block is used to create items in the game, from weapons to food and clothing. The parameters available in this block mostly depend on the type of item you are creating, set with [ItemType](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-itemtype).

  To get started, create a simple item structure by setting that parameter up correctly, then add more parameters as you need. For example, for a normal item:
  ```cpp
  module yourModule
  {
    item yourID
    {
      ItemType = base:normal,
      ...
    }
  }
  ```

  To add a name to display for your item, you need to add the item full type, that is its `module.id`, inside the [ItemName](https://pz-wiki-modding.github.io/PZ-API-Docs/translations/translation_files.html#itemname) translation file. Taking the example from above, your translation file would be:
  ```json
  {
    "yourModule.yourID": "Your Item Name"
  }
  ```
shouldHaveParent: true
parents:
- module
ID: {}
softOverride: true
parameters:
- name: AcceptItemFunction
  type:
    main: string
    callback:
      parameters:
        - name: container
          type: ItemContainer
          isJava: true
        - name: item
          type: InventoryItem
          isJava: true
- name: AcceptMediaType
  itemTypes:
  - radio
  type:
    main: integer
  default: -1
