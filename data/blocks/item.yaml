    [MinutesToCook](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-minutestocook) controls how many in-game minutes it takes for the food to be fully cooked. 
    
    [MinutesToBurn](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-minutestoburn) controls how many in-game minutes it takes for the food to burn. This value must be higher than [MinutesToCook](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-minutestocook) or your item will be instantly burnt before being fully cooked.

