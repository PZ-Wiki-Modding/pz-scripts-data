- name: Weight
  description: |-
    [Weight](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-weight) sets the weight of the item, or more commonly refered to as a [encumbrance](https://pzwiki.net/wiki/Heavy_load). [Weapon parts](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/inventory/types/WeaponPart.html) will impact the weight of the weapon when attached. Will also impact stamina drain when [UseEndurance](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-useendurance) is `true`.

    [WeightEmpty](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-weightempty) is used to set the weight of a drainable when it is empty.

    [WeightWet](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-weightwet) is used to set the weight of a clothing item when it is wet. The weight of the clothing item will be interpolated between `Weight` and `WeightWet` based on the [wetness](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/inventory/InventoryItem.html#getWetness()) of the clothing item.
  type:
    main: float
  default: 1.0
  minimum: 0.0
