- name: CritDmgMultiplier
  default: 2.0
  type:
    main: float
  description: |-
    Multiplier applied to the damage of a hit if it is a critical hit, applied inside [IsoGameCharacter.Hit()](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/characters/IsoGameCharacter.html#Hit(zombie.inventory.types.HandWeapon,zombie.characters.IsoGameCharacter,float,boolean,float,boolean)). Two types of crits can trigger:
    - A normal crit: `damage *= max(2.0, CritDmgMultiplier)`
    - Aim-at-floor stomp (melee only): `damage *= max(5.0, CritDmgMultiplier)`

    The default value of the `HandWeapon` class is `2.0`. Values of `3.0` to `5.0` visibly spike crit damage while values above `5.0` also start boosting stomps.
  itemTypes:
  - weapon
- name: CriticalChance
  itemTypes:
  - weapon
  type:
    main: float
  default: 20.0
  needs:
    - name: ItemType
      values:
      - base:weapon
  description: |-
    [CriticalChance](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-criticalchance) sets the base critical hit chance of the weapon. The final `CriticalChance` value after all applied bonuses and penalties have been applied is compared on a 0-100 roll.
    
    Below is a table listing the different elements which can influence the critical hit chance of a weapon:
    
    | Element | Type | Description | Formula |
    |---|---|---|---|
    | [AimingPerkCritModifier](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-aimingperkcritmodifier) and [aiming skill](https://pzwiki.net/wiki/Aiming) of the character | Weapon parameter | The aiming level of the character impacts the player's critical hit chance by adding the following to the `CriticalChance` value. | `CriticalChance += AimingPerkCritModifier * Aiming level` |
    | Sight bonus / penalty | Weapon parameter | In the formula, `sightWindowBonus` refers to the bonus from [MinSightRange](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-minsightrange) and [MaxSightRange](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-maxsightrange). `sightlessBonus` on the other hand is a simpler parameter which uses a distance falloff when there is not active sight. The best path is used for the better result. The aim delay penalty depends on [Aimingtime](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-aimingtime) | `CriticalChance += max(sightlessBonus - sightlessAimDelayPenalty, sightWindowBonus - sightWindowAimDelayPenalty)` |
    | Moodles penalty | Player condition | Being panicked, stressed, tired, drunk or lacking endurance will all negatively impact the `CriticalChance`. | `CriticalChance -= moodlesPenalty` |
    | Weather penalty | Environment | Wind, rain, fog, low-light will all negatively impact the `CriticalChance`. | `CriticalChance -= weatherPenalty` |
    | Movement penalty | Player condition | The shooter speed and the distance will negatively impact the `CriticalChance`. | `CriticalChance -= movementPenalty` |
    | [Marksman trait](https://pzwiki.net/wiki/Marksman) | Player condition | This condition can never be reached as the Marksman trait no longer exists. | `CriticalChance += 10` |

    For PvP targets, the entire formula is bypassed and [StopPower](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-stoppower) is used instead. `StopPower` is never used against non-player targets.
    ```
    CriticalChance = StopPower * ( 1 + Aiming level / 15)
    ```

    `CriticalChance` sets the floor for unskilled players while `AimingPerkCritModifier` rewards more or less the character ability to aim. High modified and low base chance means the weapon is a skill-gated crit machine, making the weapon a sort of "experts" weapon.
