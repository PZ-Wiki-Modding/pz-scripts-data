- name: RecoilDelay
  description: |-
    [RecoilDelay](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/item.html#item-recoildelay) is a stat which is directly applied to a [HandWeapon](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/inventory/types/HandWeapon.html) while [AimingTimeModifier](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/item.html#item-recoildelaymodifier) is applied to [weapon parts](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/inventory/types/WeaponPart.html). Weapon attachments will add or subtract from [RecoilDelay](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/item.html#item-recoildelay) directly.

    Controls how long post-shot recovery takes before aim settling can begin. High values means the gun has a huge kick and forces a pause. Lower values is a flat, fast and snappy gun. [Strength](https://pzwiki.net/wiki/Strength) and [aiming](https://pzwiki.net/wiki/Aiming) will both reduce the recoil delay. Holding the gun one-handed will negatively impact the recoil handling. The following formula is used:
    ```java
    effectiveDelay = RecoilDelay
                  * (1 - AimingLevel / 40)
                  * (1 - (StrengthLevel * 2 - 10) / 40)
                  * (one-handed penalty: * 1.3 if primary hand only, secondary empty)
    ```

    Aim countdown starts when the recoil delay counter is less than `effectiveDelay * AimingLevel / 30`. Higher aiming also lets aim recovery start earlier in the recoil window.
  needs:
    - name: ItemType
      values:
        - base:weapon
- name: RecoilDelayModifier
  "#desc": item/RecoilDelay
  needs:
    - name: ItemType
      values:
        - base:weaponpart
