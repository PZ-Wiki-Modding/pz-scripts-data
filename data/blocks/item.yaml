- name: PartType
  description: |-
    Marks the [WeaponPart](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-itemtype) as a specific type of part. For proper tooltip of your weapon part, you need to either use one of the existing parts or use a custom part type but provide a translation entry inside [Tooltip.json](https://pz-wiki-modding.github.io/PZ-API-Docs/translations/translation_files.html#tooltip) as `Tooltip_weapon_` followed by that part type value. For example, if you set `PartType = customPart`, you need to provide a translation entry as `Tooltip_weapon_customPart` with the name of your part.

    Here are the available part types in the base game:
    - RecoilPad
    - Clip
    - Canon
    - Scope
    - Sling
    - Stock

    There are also some indirect part types. If the item has the [TorchCone](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-torchcone) parameter, that part will be valid as a torch attachment. If it has the [tag](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-itemtag) `base:optics`, it will be valid as an optics attachment.

    Technically, there are other `Tooltip_weapon_` combination than the ones listed above, but they are not used as part types, but due to them sharing the same translation entry format, they can technically be used as a part type. It means these should not be used as part types, as you'd have to overwrite their translation entries which could brake the translation of the base game:
    - Condition
    - HandleCondition
    - HeadCondition
    - Sharpness
    - Repaired
    - Damage
    - Unusable_at_max_exertion
    - Ammo
    - AmmoCount
    - Range
    - Type
    - CanBeMountOn
    - Jammed
    - NoRoundChambered
    - SpentRoundChambered
    - SpentRounds
    - ContainsClip
    - NoClip
    - NoMaintenanceXp
