version: 1
name: ROOT-SandboxOptions
description: |-
  The root of a sandbox options file. The file should be stored in the following path:
  ```
  📁 media
    📄 sandbox-options.txt
  ```
  
  You can find more information about sandbox options [here](https://pzwiki.net/wiki/Sandbox_options).
shouldHaveParent: false
parents: []
isRoot: true
pattern:
- media\/sandbox-options\.txt$
parameters:
- name: VERSION
  description: The version of the handler of the sandbox options. Keep this equal to 1.
  required: true
  values:
    - 1
