version: 1
name: ROOT-SandboxOptions
description: The root of a script file. Blocks than need to be in the root of the document should have this as parent.
shouldHaveParent: false
parents: []
isRoot: true
pattern:
  - media\/sandbox-options\.txt$
parameters:
  - name: VERSION
    description: The version of the handler of the sandbox options. Keep this equal to 1.
    required: true