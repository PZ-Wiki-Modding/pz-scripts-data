version: 1
name: imports
description: By importing a module, you give your scripts direct access to the elements
  from these modules, and you can use item IDs directly without the module prefix
  (for example, you can use `ThatModItem` instead of `ThisMod.ThatModItem`). The `Base`
  module is by default already parsed, so you don't need to import it. It is overall
  suggested to not import modules and instead directly reference the IDs with their
  module.
shouldHaveParent: true
parents:
- module
- xuiSkin
parameters: []
