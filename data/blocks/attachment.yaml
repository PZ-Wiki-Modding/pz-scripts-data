shouldHaveParent: true
parents:
- vehicle
- model
- template
ID: {}
parameters:
- name: offset
  type:
    main: array
    array:
      type: float
      separator: ' '
  description: "The position offset of the model relative to the bone. This is a vector\
    \ in the format `x y z`. \n\n```cpp\noffset = -0.0300 -0.1020 0.1210,\n```"
- name: rotate
  type:
    main: array
    array:
      type: float
      separator: ' '
  description: |-
    The rotation of the model relative to the bone. This is a vector in the format `x y z`. The values are degrees.

    ```cpp
    rotate = -60.0000 -49.0000 -3.0000,
    ```
- name: zoffset
- name: scale
  type:
    main: float
  description: |-
    The scale multiplier applied to the model attached to this attachment point.

    ```cpp
    scale = 0.5,
    ```
- name: bone
  description: "\tThe name of the bone to which the model is attached to. \n\n ```cpp\n\
    \ bone = Bip01_L_Hand,\n ```"
