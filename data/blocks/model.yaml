version: 1
name: model
description: |-
  Used to define a model properties so it can be used in other elements of the game, most notably in [items](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html) and [vehicles](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/vehicle.html). The basic structure of a model block is as follows:
  ```cpp
  module YourModule {
    model YourModel {
      mesh = your_model,
      texture = your_model_texture,
    }
  }
  ```

  [Attachments](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/attachment.html) blocks can also be added to the model definition to specify how the model should be placed, rotated and scaled when attached to a parent model.
shouldHaveParent: true
parents:
- module
- vehicle
- part
ID:
  parentsWithout:
  - vehicle
  optional:
  - part
parameters:
- name: animationsMesh
  description: |-
    Sets the [animations mesh](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/animationsmesh.html) for the model. This is used for models that are used for entities such as the character or animals.
  type:
    main: block
    block:
      name: animationsMesh
- name: boneWeight
  description: |-
    Sets the bone weight for the model. This is notably used for vehicle bones but it is yet documented how this actually impacts the model or animations linked to it.
  type:
    main: object
    object:
      keyValueSeparator: " "
      keyType: string
      pairsSeparator: ";"
      valueType: float
      softOverride: true
  allowedDuplicate: true
- name: ColorBlue
- name: ColorGreen
- name: ColorRed
- name: cullFace
  description: |-
    Sets an OpenGL face culling mode for the model. By default the culling mode will be `-1`, which defaults to `Front`

    `None` supposedly disables face culling, all polygons are rendered. `Back` culls back-facing polygons, only renders front faces. `Front` culls front-facing polygons, only renders back faces.

    This is likely the reason why when you have inverted normals on your model, you'll see through those inverted faces. You should keep this parameter by default however unless you actually need a model that can be seen on both sides of faces (plane models for example). This is used for muzzle flashes for guns notably.

    Note that this parameter defaulting to `Front` sounds abnormal as the faces pointing in the direction of the normals are rendered in the game, so this suggests that something is done at some point to invert the normals or something else is going on that would render the correct faces of the model.
  type:
    main: string
  default: Back # the final type of the field this is written to is an integer (-1), but seems to default the whole thing to `Back`
  values:
    - 'Back'
    - 'Front'
    - 'None'
- name: file
- name: invertX
  description: |-
    If set to `true`, the model scale will be inverted on the X axis.
  type:
    main: boolean
- name: mesh
  description: |-
    Path to the model file relative to the `media/models_X` folder. The model file can be either of `.fbx` or `.glb` but also the not recommended `.x` (read more [here](https://pzwiki.net/wiki/Modeling#File_types)). The extension should not be included in the value of this parameter.

    If your `mesh` parameter is set to `my_model`, the game will expect the model to be stored in the following path:
    ```
    📁 media
      📁 models_X
        📄 my_model.fbx
    ```

    It is suggested to put your models in a subfolder of the `models_X` folder named after your mod to reduce the risk of model name conflicts with other mods.
- name: offset
- name: postProcess
  description: |-
    Sets post-processing steps for assimp to use when importing the model. Steps should be separated with `;`, and prefixed with either `+` to add the step or `-` to remove the step (primarily used to remove a default step). Steps correspond to members of the [AiPostProcessSteps](https://github.com/assimp/assimp/blob/master/port/jassimp/jassimp/src/jassimp/AiPostProcessSteps.java) enum. The default steps are `FIND_INSTANCES`, `MAKE_LEFT_HANDED`, `LIMIT_BONE_WEIGHTS`, `TRIANGULATE`, `OPTIMIZE_MESHES`, `REMOVE_REDUNDANT_MATERIALS`, `JOIN_IDENTICAL_VERTICES`.

    It is unclear what this is used for exactly and should probably not be modified unless you are looking into advanced model manipulation.
  type:
    main: string
- name: scale
  description: |-
    Used to scale the model up or down. A value of `1` means the model is at its original size.
  type:
    main: float
- name: shader
  description: |-
    Used to control what shader will apply on the model. The most common shaders which are used by the game are:
    - `animalEffect`
    - `door`
    - `vehicle`
    - `vehiclewheel`
    - `vehicle_multiuv`
    - `vehicle_norandom_multiuv`

    The shaders are stored in the folder `media/shaders`.
- name: specialKeyRing
- name: static
  description: |-
    If set to `true`, the model will not deform with the bones it is parented to. This is typically used for non deformable objects, which means clothings should not be static.
  type:
    main: boolean
- name: texture
  description: |-
    Path to the texture file relative to the `media/textures` folder. The texture file should be of `.png` format only.

    For example, if your `texture` parameter is set to `my_model_texture`, the game will expect the texture to be stored in the following path:
    ```
    📁 media
      📁 textures
        📄 my_model_texture.png
    ```

    It is suggested to put your textures in a subfolder of the `textures` folder named after your mod to reduce the risk of texture name conflicts with other mods.
- name: undoCoreScale
  description: |-
    If set to `true`, the model scale will be multiplied by `0.6666667`. This seems to be mostly used for tile models.
  type:
    main: boolean
  default: false
- name: attachmentParent
- name: attachmentSelf
- name: ignoreVehicleScale
- name: rotate
