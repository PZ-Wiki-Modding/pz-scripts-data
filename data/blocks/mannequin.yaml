version: 1
name: mannequin
description: |-
  Used to define [mannequins](https://pzwiki.net/wiki/Mannequin), which can be used in [mapping](https://pzwiki.net/wiki/Mapping) to create mannequins in the world.

  To get a list of available mannequins, see [this](https://pzwiki.net/wiki/Mannequin_(scripts)#Available_mannequins).
shouldHaveParent: true
parents:
- module
ID: {}
parameters:
- name: animSet
  description: |-
    [animSet](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/model.html#mannequin-animset) defines the [AnimSet](https://pzwiki.net/wiki/AnimSet) used by the mannequin, which you probably should keep as `mannequin`. [animState](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/model.html#mannequin-animstate) will set the [AnimState](https://pzwiki.net/wiki/AnimState) used in the provided animSet. The [pose](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/model.html#mannequin-pose) parameter will set the [AnimNode](https://pzwiki.net/wiki/AnimNode) used by the mannequin, so the file inside the animState.

    For example, take the vanilla mannequin AnimSets:
    ```
    📁 media
      📁 AnimSets
        📁 mannequin
          📁 female
            📄 pose01.xml
            📄 pose02.xml
            📄 pose03.xml
          📁 male
            📄 pose01.xml
            📄 pose02.xml
            📄 pose03.xml
          📁 scarecrow
            📄 pose01.xml
          📁 skeleton
            📄 pose01.xml
    ```

    If we want to use the AnimState `female` and AnimNode `pose01.xml`, we need the following parameter combination:
    ```cpp
    animNode=mannequin,
    animState=female,
    pose=pose01,
    ```
  type:
    main: string
- name: animState
  "#desc": mannequin/animSet
  type:
    main: string
- name: female
  description: |-
    Set to `true` to mark the mannequin as female, which wil change its body type.
  type:
    main: boolean
  default: true
- name: model
  description: |-
    The [model](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/model.html) used by the mannequin. Some of the models available are:
    - FemaleBody
    - MaleBody
    - Mannequin_Scarecrow
    - Mannequin_Skeleton

    By combining it with the [texture](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/model.html#mannequin-texture) parameter, you can create a variety of mannequin appearances.
  type:
    main: block
    block:
      name: model
- name: outfit
  description: |-
    The outfit used by the mannequin.
  type:
    main: string
  canBeEmpty: true
- name: pose
  "#desc": mannequin/animSet
  type:
    main: string
- name: texture
  description: |-
    Used to chose the texture that will be rendered on the mannequin model. The texture needs to be in the `media/textures/body` folder.
  type:
    main: string
