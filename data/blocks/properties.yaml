version: 1
name: Properties
description: Define stat changes applied to the player drinking this [fluid](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/fluid.html) or properties for a [tile](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/tile.html).
shouldHaveParent: true
parents:
- fluid
- tile
parameters:
- name: ThirstChange
  type:
    main: float
  description: The amount of thirst this fluid changes when consumed. Positive values
    increase thirst, negative values decrease it.
  needs:
    - parents:
      - fluid
- name: alcohol
  type:
    main: float
  needs:
    - parents:
      - fluid
- name: HungerChange
  type:
    main: float
  description: The amount of hunger this fluid changes when consumed. Positive values
    increase hunger, negative values decrease it.
  needs:
    - parents:
      - fluid
- name: Calories
  type:
    main: float
  description: The number of calories this fluid provides when consumed.
  needs:
    - parents:
      - fluid
- name: Carbohydrates
  type:
    main: float
  description: The amount of carbohydrates this fluid provides when consumed.
  needs:
    - parents:
      - fluid
- name: Lipids
  type:
    main: float
  description: The amount of lipids (fats) this fluid provides when consumed.
  needs:
    - parents:
      - fluid
- name: Proteins
  type:
    main: float
  description: The amount of proteins this fluid provides when consumed.
  needs:
    - parents:
      - fluid
- name: fluReduction
  type:
    main: float
  needs:
    - parents:
      - fluid
- name: painReduction
  type:
    main: float
  description: The amount of pain this fluid reduces when consumed.
  needs:
    - parents:
      - fluid
- name: enduranceChange
  type:
    main: float
  description: The amount of endurance given back.
  needs:
    - parents:
      - fluid
- name: foodSicknessChange
  type:
    main: float
  description: The amount of food sickness provides.
  needs:
    - parents:
      - fluid
- name: fatigueChange
  type:
    main: float
  description: |-
    The amount of fatigue this fluid changes when consumed. Positive values increase fatigue, negative values decrease it.
  needs:
    - parents:
      - fluid
- name: StressChange
  type:
    main: float
  description: |-
    The amount of stress this fluid changes when consumed. Positive values increase stress, negative values decrease it.
  needs:
    - parents:
      - fluid
- name: UnhappyChange
  type:
    main: float
  description: |- 
    The amount of unhappiness this fluid changes when consumed. Positive values increase unhappiness, negative values decrease it.
  needs:
    - parents:
      - fluid
