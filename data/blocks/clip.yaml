version: 1
name: clip
description: |-
  Defines a clip to be used in a [sound script](https://sirdoggyjvla.github.io/pz-scripts-data/blocks/sound.html), which is a single sound file with properties that determine how it is played in the game.

  ```cpp
  module yourModule {
    sound yourSound {
      category = Animal,
      loop = true,
      is3D = true,
      clip {
        file = media/sound/RideOfTheValkyries.ogg,
        distanceMin = 20,
        distanceMax = 650,
        reverbFactor = 0.1,
        volume = 0.7,
      }
    }
  }
  ```
shouldHaveParent: true
parents:
- sound
parameters:
- name: event
  type:
    main: string
- name: distanceMax
  type:
    main: integer
- name: file
  type:
    main: string
- name: distanceMin
  type:
    main: integer
- name: volume
  type:
    main: float
- name: reverbFactor
  type:
    main: float
- name: pitch
  type:
    main: float
- name: reverbMaxRange
  type:
    main: float
- name: stopImmediate
