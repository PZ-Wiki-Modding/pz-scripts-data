version: 1
name: clip
description: |-
  Defines a clip to be used in a [sound script](https://sirdoggyjvla.github.io/pz-scripts-data/blocks/sound.html), which is a single sound file with properties that determine how it is played in the game.

  module yourModule {
    sound yourSound {
      category = Animal,
      loop = true,
      is3D = true,
      clip {
        file = media/sound/RideOfTheValkyries.ogg,
        distanceMin = 20,
        distanceMax = 650,
        reverbFactor = 0.1,
        volume = 0.7,
      }
    }
  }
shouldHaveParent: true
parents:
  - sound
parameters:
  - name: event
    type: string
  - name: distanceMax
    type: integer
  - name: file
    type: string
  - name: distanceMin
    type: integer
  - name: volume
    type: float
  - name: reverbFactor
    type: float
  - name: pitch
    type: float
  - name: reverbMaxRange
    type: float
  - name: stopImmediate