version: 1
name: timedAction
description: |-
  The timedAction script block is used to define an action which can be used in [craftRecipes](https://pz-wiki-modding.github.io/PZ-API-Docs/blocks/craftrecipe.html). You can specify the animation played, props in hands during the action, the sound played. Also define its impact on the player character, including effects on calories burned and body heat generation.

  Below are a few examples of `timedAction` blocks from the vanilla game:

  ```cpp
  timedAction UseLathe
  {
      metabolics      = Default,
      actionAnim      = UseLathe,
  }
  ```

  ```cpp
  timedAction BuildCairn
  {
      metabolics      = HeavyWork,
      actionAnim      = Loot,
      animVarKey      = LootPosition,
      animVarVal      = Low,
      sound           = BuildingGeneric,
      completionSound = BuildFenceCairn,
      muscleStrainFactor = 0.0025,
      muscleStrainSkill = Strength,
      muscleStrainParts = Neck,
  }
  ```

  ```cpp
  timedAction BuildBarbedWireFence
  {
      metabolics      = HeavyWork,
      actionAnim      = Loot,
      animVarKey      = LootPosition,
      animVarVal      = Low,
      sound           = BuildingGeneric,
      completionSound = BuildMetalStructureSmallWiredFence,
  }
  ```
shouldHaveParent: true
parents:
- module
ID: {}
parameters:
- name: actionAnim
  description: |-
    The actionAnim parameter is used to define the animation played during a timed action. It links to a [PerformingAction](https://pzwiki.net/wiki/PerformingAction) define in the action [AnimSets](https://pzwiki.net/wiki/AnimSet) of the player.
  type:
    main: string
- name: animVarKey
  description: |-
    The [animVarKey](https://pz-wiki-modding.github.io/PZ-API-Docs/blocks/timedaction.html#animVarKey) and [animVarVal](https://pz-wiki-modding.github.io/PZ-API-Docs/blocks/timedaction.html#animVarVal) parameters are used together to link to a specific [AnimNode Conditions](https://pzwiki.net/wiki/Conditions). `animVarKey` will correspond to the `m_Name` field and `animVarVal` to the `m_Value` field.

    This allows for easy swapping between variants of [actionAnim](https://pz-wiki-modding.github.io/PZ-API-Docs/blocks/timedaction.html#actionAnim). For example, for the AnimNode:

    ```cpp
    <?xml version="1.0" encoding="utf-8"?>
    <animNode x_extends="Loot.xml">
      <m_Name>LootHigh</m_Name>
      <m_AnimName>Bob_IdleLooting_High</m_AnimName>
      <m_Conditions />
      <m_Conditions />
      <m_Conditions>
        <m_Name>LootPosition</m_Name>
        <m_Type>STRING</m_Type>
        <m_StringValue>High</m_StringValue>
      </m_Conditions>
    </animNode>
    ```

    You can define those parameters in the timedAction as follows:

    ```cpp
    actionAnim      = Loot,
    animVarKey      = LootPosition,
    animVarVal      = Low,
    ```
- name: animVarVal
  "#desc": timedAction/animVarKey
- name: completionSound
  description: |-
    Defines the sound played at the end of the action.
  type:
    main: string
    block:
      name: sound
- name: metabolics
  description: |-
    The metabolics parameter is used to define the impact of the action on the player character's metabolics, such as the calories burn rate or body heat generation. It uses predefined enumeration values to specify the multiplier on the metabolism. You can find a list of metabolic types and their associated values in the [Metabolics](https://pz-wiki-modding.github.io/PZ-API-Docs/java/metabolics.html) documentation.
- name: muscleStrainFactor
  description: |-
    Muscle strain is an effect which applies to the character limbs, simulating the fatigue and strain of performing certain actions. A timedAction script can be set to apply muscle strain to specific limbs and based on the level of the character in a specific skill.

    [muscleStrainFactor](https://pz-wiki-modding.github.io/PZ-API-Docs/blocks/timedaction.html#muscleStrainFactor) serves as a parameter of how much muscle strain will be gained.

    [muscleStrainParts](https://pz-wiki-modding.github.io/PZ-API-Docs/blocks/timedaction.html#muscleStrainParts) will indicate the limbs affected by the muscle strain, which needs to be an array of [BodyPartType](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/characters/BodyDamage/BodyPartType.html#enum-constant-summary).

    If [muscleStrainSkill](https://pz-wiki-modding.github.io/PZ-API-Docs/blocks/timedaction.html#muscleStrainSkill) is provided, the skill will be used to reduce the muscle strain when the player gets better at something.

    ```
    strain = deltaTime * muscleStrainFactor * (1 - skillLevel * 0.5)
    ```
- name: muscleStrainParts
  "#desc": timedAction/muscleStrainFactor
  type:
    main: array
    array:
      separator: ;
      type: string
  needs:
    - name: muscleStrainParts
- name: muscleStrainSkill
  "#desc": timedAction/muscleStrainFactor
- name: prop1
  type:
    main: string
    block:
      name: model
      fullType: true
- name: prop2
  type:
    main: string
    block:
      name: model
      fullType: true
- name: sound
  description: |-
    Defines the sound played during the action.
  type:
    main: string
    block:
      name: sound
- name: soundTime
  description: |-
    This parameter is used in the Lua to indicate when the sound should be played during the timed action. This is notably used to play a sound at the end or the start of the action during [crafting](https://pz-wiki-modding.github.io/PZ-API-Docs/blocks/craftRecipe.html#timedAction).

    By itself, this doesn't do anything and requires implementation in [Lua](https://pzwiki.net/wiki/Lua_(API)). For example inside `ISHandcraftAction`.

    For a full list of the accepted events, see [this](https://pz-wiki-modding.github.io/PZ-API-Docs/java/action_sound_time.html).
  isUseless: true
  type:
    main: string
  default: action_start
