version: 1
name: ROOT-TileGeometry
description: The `tileGeometry.txt` file is used to register the tile depth of tiles.
  The file needs to be located inside the [common/media](https://pzwiki.net/wiki/Mod_structure#Common_and_versioning_folders)
  folder.
shouldHaveParent: false
parents: []
isRoot: true
pattern:
- media\/tileGeometry\.txt$
parameters:
- name: VERSION
  description: The version of the tile geometry file format. Keep it at 2 for now.
