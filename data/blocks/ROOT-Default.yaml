version: 1
name: ROOT-Default
description: The default.txt file is used to select the mods and maps that will be loaded by the game.
shouldHaveParent: false
parents: []
needsChildren:
  - mods
  - maps
isRoot: true
pattern:
- mods/default\.txt$
parameters:
- name: VERSION
  type:
    main: integer
  description: The version of the default.txt file. Keep it at 1.