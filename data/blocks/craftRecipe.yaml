version: 1
name: craftRecipe
description: |-
  The 'craftRecipe' script block is used to define a crafting recipe, which allows players to craft items or tiles in the game based on the parent script block. For example, a craftRecipe defined inside a [module](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/module.html) will be a recipe to craft an item usually, while when defined inside an [entity](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/entity.html) it will be the building recipe for that entity.

  A craftRecipe will usually require an [inputs](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/inputs.html) and [outputs](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/outputs.html) block. Other parameters are used to define properties of this recipe, such as the [time](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/craftrecipe.html#time) it takes to craft or the [XP awarded](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/craftrecipe.html#xpaward) for crafting it.

  For example:
  ```cpp
  module yourModule /* or Base */
  {
      craftRecipe yourRecipeID
      {
          ...
      }
  }
  ```

  To define a translation for this recipe, you need to create an entry in the translation file [Recipes.json](https://pz-wiki-modding.github.io/PZ-API-Docs/translations/translation_files.html#recipes). The translation entry should be formatted like this:
  ```json
  {
    "yourRecipeID": "Your recipe"
  }
  ```

  Notice how you shouldn't use the [module](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/module.html) in the translation file key and only the craftRecipe ID.

  Here's an example of a craftRecipe with some parameters defined:
  ```cpp
  craftRecipe SawLogs
  {
      timedAction = SawLogs,
      Time = 230,
      Tags = InHandCraft;CanBeDoneFromFloor,
      category = Carpentry,
      xpAward = Woodwork:5,
      inputs
      {
          item 1 [Base.Log] flags[Prop2],
          item 1 tags[Saw] mode:keep flags[MayDegradeLight;Prop1],
      }
      outputs
      {
          item 3 Base.Plank,
      }
  }
  ```

  Or:
  ```cpp
  craftRecipe CarveWhistle
  {
      time = 200,
      tags = AnySurfaceCraft;Survivalist,
      category = Carving,
      xpAward = Carving:60,
      SkillRequired = Carving:6,
      needTobeLearn = true,
      AutoLearnAny = Carving:8,
      timedAction = SharpenStake,
      inputs
      {
          item 1 tags[DrillWood;DrillMetal;DrillWoodPoor] mode:keep flags[MayDegradeLight],
          item 1 tags[SharpKnife] mode:keep flags[MayDegradeLight],
          item 1 [Base.SmallAnimalBone] flags[Prop2;AllowDestroyedItem],
      }
      outputs
      {
          item 1 Base.Whistle_Bone,
      }
  }
  ```

  And a more advanced one:
  ```cpp
  craftRecipe RefillHurricaneLantern
  {
      timedAction = Making,
      Time = 50,
      OnCreate = Recipe.OnCreate.RefillHurricaneLantern,
      /* OnTest = Recipe.OnTest.RefillHurricaneLantern, */
      Tags = InHandCraft;CanBeDoneInDark,
      category = Miscellaneous, /*category = Survival,*/
      inputs
      {
          item 1 [Base.Lantern_Hurricane;Base.Lantern_Hurricane_Copper;Base.Lantern_Hurricane_Forged;Base.Lantern_Hurricane_Gold;Base.Lantern_Hurricane_Silver] mode:destroy flags[NotFull;AllowFavorite;InheritFavorite;ItemCount] mappers[LampMapper],
          item 1 [*],
          -fluid 1.0 [Petrol],
      }
      outputs
      {
          item 1 mapper:LampMapper,
      }
      itemMapper LampMapper
      {
          Base.Lantern_Hurricane = Base.Lantern_Hurricane,
          Base.Lantern_Hurricane_Copper = Base.Lantern_Hurricane_Copper,
          Base.Lantern_Hurricane_Forged = Base.Lantern_Hurricane_Forged,
          Base.Lantern_Hurricane_Gold = Base.Lantern_Hurricane_Gold,
          Base.Lantern_Hurricane_Silver = Base.Lantern_Hurricane_Silver,

          default = Base.Lantern_Hurricane,
      }
  }
  ```
shouldHaveParent: true
parents:
- module
needsChildren:
- inputs
ID: {}
softOverride: true
parameters:
- name: AllowBatchCraft
  description: The AllowBatchCraft parameter is used to allow the recipe to be crafted
    in batches. This will make a slider appear on the crafting to craft multiple ones
    at once. Needs to be a boolean and default is true, set to false to disable batch
    craft.
  type:
    main: boolean
  default: true
- name: Animation
  isUseless: true
  type:
    main: string
- name: AutoLearnAll
  description: |-
    The `autoLearnAll` parameter specifies that all the provided skills and their associated level need to be reached to learn the recipe. The parameter should be formated this way:
    ```cpp
    /* a single skill */
    autoLearnAll = <skill name>:<level amount>,

    /* multiple skills */
    autoLearnAll = <skill1 name>:<level amount>;<skill2 name>:<level amount>,format
    ```
    For the list of available skills, see [this](https://pzwiki.net/wiki/CraftRecipe#Available_skills).

    For example:
    ```cpp
    autoLearnAll = Carving:3;Maintenance:2,
    ```
- name: AutoLearnAny
  description: |-
    The autoLearnAny parameter specifies that at least one of the skills and its associated level need to be reached to learn the recipe. The parameter should be formated this way:
    ```cpp
    /* a single skill */
    autoLearnAny = <skill name>:<level amount>,

    /* multiple skills */
    autoLearnAny = <skill1 name>:<level amount>;<skill2 name>:<level amount>,format
    ```
    For the list of available skills, see [this](https://pzwiki.net/wiki/CraftRecipe#Available_skills).

    For example:
    ```cpp
    autoLearnAny = Carving:3;Maintenance:2,
    ```
- name: CanWalk
  description: Whether the player can walk while crafting this recipe.
  type:
    main: boolean
  default: false
- name: category
  description: The category under which the recipe will be listed in the crafting
    menu. Helps to organize and identify recipes in the crafting menu. Currently doesn't
    support translations (confirmed last 42.15).
- name: Icon
  description: |-
    Specifies the icon associated with this crafting recipe. The icon needs to be located in `media/textures`, for example `media/textures/myIcon.png` will be refered to as `Icon = myIcon,`.
    
    This seems to be used only once in the vanilla recipes with the entry `Icon = Item_WaterDrop,`, as the icon usually defaults to the items that will be crafted.
- name: MetaRecipe
  description: A meta recipe is used to link two recipes so that if the meta recipe is known then this recipe will be known.
- name: NeedToBeLearn
  description: Whether the recipe needs to be learned before it can be crafted.
- name: OnCreate
  description: |-
    The OnCreate parameter allows the referencing of a Lua function that will be called when the crafting recipe is finished. This can be used to add custom behavior to the crafting recipe when it gets finished. The Lua function needs to be a [global function](https://pzwiki.net/wiki/Lua_(language)#Local_and_global), it can also be in a global table. The vanilla game OnCreate's are stored in the [Java](https://pzwiki.net/wiki/Java).

    The function should have the following structure:
    ```lua
    function MyOnCreateFunction(craftRecipeData, character)
        -- your custom code here
    end
    ```

    The `craftRecipeData` is a [java object](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/entity/components/crafting/recipe/CraftRecipeData.html) that contains the data of the crafting recipe. The `character` is the player character who is crafting the recipe.
- name: OnTest
  description: |-
    The OnTest parameter is used to define a Lua function that will be called to verify if the recipe can be crafted. If the function returns true, the recipe can be crafted but if the function returns false, the recipe cannot be crafted. The Lua function needs to be a [global function](https://pzwiki.net/wiki/Lua_(language)#Local_and_global), it can also be in a global table. The vanilla game OnTest's are stored in the [Java](https://pzwiki.net/wiki/Java).

    The function should have the following structure:
    ```lua
    function MyOnTestFunction(item, character)
        -- your custom code here
        return logicTestResult  -- based on your logic test above
    end
    ```

    `item` is an InventoryItem while `character` is the player trying to craft this recipe.
- name: OnFailed
- name: OnUpdate
- name: OnAddToMenu
- name: overlayStyle
- name: recipeGroup
- name: ResearchAny
- name: ResearchSkillLevel
- name: SkillRequired
  description: |-
    Specifies the skill level required to perform this crafting action. It should be formated this way:
    ```cpp
    /* a single skill */
    skillRequired = <skill name>:<level>,

    /* multiple skills */
    skillRequired = <skill1 name>:<level>;<skill2 name>:<level>,
    ```
    For the list of available skills, see [this](https://pzwiki.net/wiki/CraftRecipe#Available_skills).

    For example:
    ```cpp
    skillRequired = Blacksmith:3;Tailoring:2,
    ```
- name: tags
  description: |-
    Specifies specific conditions which need to be respected to craft this item. At least one crafting bench tag is necessary for the craft to be recognized, such as `AnySurfaceCraft`. The syntax is as follows:
    ```cpp
    /* single tag */
    Tags = tag1,

    /* multiple tags */
    Tags = tag1;tag2;...,
    ```

    For example:
    ```cpp
    Tags = InHandCraft;CanAlwaysBeResearched,
    ```

    A crafting bench tag can be created by adding a [component CraftBench](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/component/component-craftbench.html) to an [entity](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/entity.html) script, which can then be used in this tags parameter.
  required: true
  type:
    main: array
    array:
      separator: ;
      type: string
- name: time
  description: The time it takes to craft the item, not using a specific unit of time.
  default: 50
- name: timedAction
  type:
    main: string
    block:
      name: timedAction
  description: |-
    Refers to a timed action script block to trigger during the crafting process, for animations and/or sounds but also the calories burned and body heat generation.
- name: Tooltip
  description: Description of the crafting which is shown in the crafting menu.
- name: xpAward
  description: |-
    Specifies the experience points awarded for crafting this item. The parameter should be formated this way:
    ```cpp
    /* a single skill */
    xpAward = <skill name>:<xp amount>,

    /* multiple skills */
    xpAward = <skill1 name>:<xp amount>;<skill2 name>:<xp amount>,format
    ```
    For the list of available skills, see [this](https://pzwiki.net/wiki/CraftRecipe#Available_skills).

    For example:
    ```cpp
    xpAward = Blacksmith:10;Tailoring:5,
    ```
