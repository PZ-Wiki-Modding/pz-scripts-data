version: 1
name: vehicle
description: Defines a vehicle.
shouldHaveParent: true
parents:
- module
ID: {}
parameters:
- name: animalTrailerSize
  type:
    main: float
  description: Sets the maximum total encumbrance from animals in the animal trailer.
    The horsebox and livestock trailers both use 500.
- name: brakingForce
- name: carMechanicsOverlay
  type:
    main: string
- name: carModelName
  type:
    main: string
  description: "Set the [translation](https://pzwiki.net/wiki/Translation) key for\
    \ the car name. The translation entry needs to be stored inside the IG_UI translation\
    \ file and have `IGUI_VehicleName` as a prefix. \n\nFor example:\n```cpp\ncarModelName\
    \ = YourCar,\n```\n\nWith the translation entry inside `IG_UI.json`:\n```json\n\
    {\n  \"IGUI_VehicleNameYourCar\": \"Your car model\"\n}\n```"
- name: centerOfMassOffset
- name: engineForce
  type:
    main: float
  default: 3000
  description: engineForce is 10x what is displayed in the mechanics menu for horsepower.
- name: engineIdleSpeed
  type:
    main: float
  default: 750.0
- name: engineLoudness
  type:
    main: integer
  default: 100
- name: engineQuality
  type:
    main: integer
  default: 100
- name: engineRepairLevel
  type:
    main: integer
  description: Required [mechanics skill](https://pzwiki.net/wiki/Mechanics) level
    for repearing the vehicle's engine.
- name: engineRPMType
  type:
    main: string
  default: jeep
  description: Sets the engine to a RPM type ([See vehicleEngineRPM block](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/vehicleenginerpm.html)).
- name: extents
  type:
    main: array
    array:
      type: float
      separator: ' '
- name: extentsOffset
  type:
    main: array
    array:
      type: float
      separator: ' '
- name: forcedColor
  type:
    main: array
    array:
      type: float
      separator: ' '
  description: Sets a forced HSV color on the vehicle. The value needs to be of format
    `hue sat val`.
  default: -1 -1 -1
- name: frontEndDurability
  type:
    main: integer
  default: 100
  description: It is unclear what that parameter does but as of 42.16.3, the game
    uses `frontEndHealth` which is a mistake.
- name: frontEndHealth
  deprecated:
    description: While that parameter is present in vanilla scripts as of 42.16.3,
      it actually does nothing because it is not parsed as `frontEndHealth` but as
      `frontEndDurability`.
    replacedBy: frontEndDurability
- name: gearRatioR
  '#desc': vehicle/gearRatioCount
  type:
    main: float
  default: 7.09
- name: gearRatio1
  '#desc': vehicle/gearRatioCount
  type:
    main: float
  default: 6.44
- name: gearRatio2
  '#desc': vehicle/gearRatioCount
  default: 4.1
- name: gearRatio3
  '#desc': vehicle/gearRatioCount
  default: 2.29
- name: gearRatio4
  '#desc': vehicle/gearRatioCount
  default: 1.47
- name: gearRatio5
  '#desc': vehicle/gearRatioCount
  default: 1.0
- name: gearRatio6
  '#desc': vehicle/gearRatioCount
- name: gearRatio7
  '#desc': vehicle/gearRatioCount
- name: gearRatio8
  '#desc': vehicle/gearRatioCount
- name: gearRatioCount
  default: 4
  type:
    main: integer
  description: "[gearRatioCount](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/vehicle.html#vehicle-gearratiocount)\
    \ will set the number of gear ratios the car can have. The vanilla cars use 4,\
    \ while sport cars use 5. \n\nA maximum of 9 ratios can be set with the parameters:\n\
    - [gearRatioR](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/vehicle.html#vehicle-gearratiocount)\
    \ (the reverse gear ratio)\n- [gearRatio1](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/vehicle.html#vehicle-gearratio1)\n\
    - [gearRatio2](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/vehicle.html#vehicle-gearratio2)\n\
    - [gearRatio3](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/vehicle.html#vehicle-gearratio3)\n\
    - [gearRatio4](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/vehicle.html#vehicle-gearratio4)\n\
    - [gearRatio5](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/vehicle.html#vehicle-gearratio5)\n\
    - [gearRatio6](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/vehicle.html#vehicle-gearratio6)\n\
    - [gearRatio7](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/vehicle.html#vehicle-gearratio7)\n\
    - [gearRatio8](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/vehicle.html#vehicle-gearratio8)\n\
    \nThose ratios take floats"
- name: hasLighter
  type:
    main: boolean
  default: true
  description: Sets whenever this car has a lighter to light a cigarette.
- name: hasSiren
  type:
    main: boolean
  isUseless: true
- name: isSmallVehicle
  type:
    main: boolean
  default: true
- name: mass
  type:
    main: float
  default: 800
  description: "Sets the mass of the vehicle which will notably be used for various\
    \ physic calculations. \n\nBy default is equal to 800. As a reference, a car has\
    \ a mass of around 800, pickup trucks have around 1100, a simple trailer around\
    \ 200, a burnt vehicle 400 or 500. See the game scripts for more examples. Values\
    \ in excess of 1400 can cause vehicle wheels to start sinking into the ground\
    \ and be unable to move."
- name: maxSpeed
  type:
    main: float
  default: 20.0
- name: maxSpeedReverse
  type:
    main: float
  default: 40.0
- name: maxSuspensionTravelCm
  type:
    main: float
  default: 500.0
- name: mechanicType
  type:
    main: integer
  description: Defines what class the vehicle is, that is 1 for standard, 2 for heavy-duty
    and 3 for performance.
  values:
  - 1
  - 2
  - 3
- name: neverSpawnKey
  type:
    main: boolean
  description: Sets whenever this vehicle will never have a key spawning in buildings
    or on zombies spawning around the vehicle.
- name: notKillCrops
  type:
    main: boolean
  description: Sets whenever the vehicle will destroy crops it is driving on.
- name: offRoadEfficiency
  type:
    main: float
  default: 1.0
  description: Affects horsepower reduction when offroad (Higher = less horsepower
    reduction when offroad.)
- name: physicsChassisShape
  type:
    main: array
  description: |-
    Defines the hitbox of the vehicle. The value should be three numbers defining the dimensions of a box:
    ```
    physicsChassisShape = height width length,
    ```

    For example:
    ```
    physicsChassisShape = height width length,
    ```

    When setting [useChassisPhysicsCollision](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/vehicle.html#vehicle-usechassisphysicscollision) to `false`, it will instead use [physics](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/physics.html) for the hitbox of the vehicle.
- name: playerDamageProtection
  type:
    main: float
  description: Multiplier applied to the amount of damage the player takes when crashing
    in the car. A value of 1 doesn't change the damage, but a lower value reduces
    it and a higher value increases it.
- name: rearEndDurability
  type:
    main: integer
  default: 100
  description: It is unclear what that parameter does but as of 42.16.3, the game
    uses `rearEndHealth` which is a mistake.
- name: rearEndHealth
  deprecated:
    description: While that parameter is present in vanilla scripts as of 42.16.3,
      it actually does nothing because it is not parsed as `rearEndHealth` but as
      `rearEndDurability`.
    replacedBy: rearEndDurability
- name: rollInfluence
  type:
    main: float
  default: 0.1
- name: seats
  type:
    main: integer
  default: 2
  description: Sets the number of seats this vehicle can have. A seat [part](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/part.html)
    needs to be created which will hold a [container](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/container.html#container)
    block with a parameter [seat](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/container.html#container-seat)
- name: shadowExtents
  type:
    main: array
    array:
      type: float
      separator: ' '
- name: shadowOffset
  type:
    main: array
    array:
      type: float
      separator: ' '
- name: specialKeyRing
  type:
    main: array
  description: '`specialKeyRing` needs to reference a keyring item to spawn. `specialKeyRingChance`
    is used to set the chance to spawn this keyring.'
- name: specialKeyRingChance
  '#desc': vehicle/specialKeyRing
  type:
    main: integer
- name: specialLootChance
  type:
    main: integer
  default: 8
- name: steeringClamp
  type:
    main: float
  default: 0.4
  description: Maximum angle you can turn the front wheels left/right
- name: steeringIncrement
  type:
    main: float
  default: 0.04
- name: stoppingMovementForce
  type:
    main: float
  default: 1.0
  description: A drag factor applied to the vehicle at all times
- name: storageCapacity
  isUseless: true
  type:
    main: integer
  default: 100
- name: suspensionCompression
  type:
    main: float
  default: 4.4
- name: suspensionDamping
  type:
    main: float
  default: 2.3
- name: suspensionRestLength
  type:
    main: float
  default: 0.6
- name: suspensionStiffness
  type:
    main: float
  default: 20.0
- name: template
  description: Uses a template script data for this vehicle.
  allowedDuplicate: true
- name: template!
  allowedDuplicate: true
- name: textureDamage1Overlay
  type:
    main: string
- name: textureDamage1Shell
  type:
    main: string
- name: textureDamage2Overlay
  type:
    main: string
- name: textureDamage2Shell
  type:
    main: string
- name: textureLights
  type:
    main: string
- name: textureMask
  type:
    main: string
- name: textureMaskEnable
  type:
    main: boolean
  isUseless: true
- name: textureRust
  type:
    main: string
- name: textureShadow
  type:
    main: string
- name: useChassisPhysicsCollision
  default: true
  type:
    main: boolean
  description: By default `true` which makes the vehicle use the [physicsChassisShape](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/vehicle.html#vehicle-physicschassisshape)
    for its hitbox. If set to false, it will instead use the [physics](https://pz-wiki-modding.github.io/pz-scripts-data/blocks/physics.html)
    blocks as the hitbox of the vehicle.
- name: wheelFriction
  type:
    main: float
  default: 800.0
  description: 'It is 1.2 to 1.9 for all vanilla vehicles and controls turning and
    stopping (but not acceleration) tire friction limits, with 1.4 being the most
    common. Values over 1.8 can cause vehicles to flip in sharp turns. (Likely depends
    somewhat on center of mass) '
- name: zombieType
  type:
    main: array
    array:
      type: string
      separator: ;
  description: Used to chose what zombie may spawn around the vehicle and is likely
    to have the key of the vehicle.
