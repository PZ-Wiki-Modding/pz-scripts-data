version: 1
name: physicsShape
description: |-
  Defines a 3D object's physical shape to be used as a world object.

  For example:
  ```cpp
  module YourModule {
    physicsShape ramp20segment5w {
        mesh = physics/ramp20|Segment5,
        translate = 4.0 0.0 0.0,
        rotate = 0.0 270.0 0.0,
    }
  }
  ```
shouldHaveParent: true
parents:
- module
ID: {}
parameters:
- name: mesh
  type:
    main: string
  description: The path to the model's mesh file, relative to the folder `media/models_X`.
- name: translate
  type:
    main: array
  description: The position offset of the model, in the format `x y z`.
- name: rotate
  type:
    main: array
  description: The rotation of the model, in the format `x y z`.
