version: 1
name: sound
description: |-
  Makes one or more sound clips available for use in the game. Multiple clips can be added to a sound script, and the game will randomly select one of them to play when the sound is triggered.

  ```cpp
  module yourModule {
    sound yourSound {
      category = Animal,
      loop = true,
      is3D = true,
      clip {
        file = media/sound/RideOfTheValkyries.ogg,
        distanceMin = 20,
        distanceMax = 650,
        reverbFactor = 0.1,
        volume = 0.7,
      }
    }
  }
  ```
shouldHaveParent: true
parents:
- module
- vehicle
- template
ID:
  parentsWithout:
  - vehicle
  - template
parameters:
- name: alarm
  needs:
  - parents:
    - vehicle
    - template
  type:
    main: array
    array:
      separator: ' '
      type: string
- name: alarmLoop
  needs:
  - parents:
    - vehicle
    - template
- name: backSignal
  needs:
  - parents:
    - vehicle
    - template
  type:
    main: string
- name: category
  description: |-
    Unclear what this parameter is for.
  type:
    main: string
- name: engine
  needs:
  - parents:
    - vehicle
    - template
  type:
    main: string
- name: engineStart
  needs:
  - parents:
    - vehicle
    - template
  type:
    main: string
- name: engineTurnOff
  needs:
  - parents:
    - vehicle
    - template
  type:
    main: string
- name: handBrake
  needs:
  - parents:
    - vehicle
    - template
  type:
    main: string
- name: horn
  needs:
  - parents:
    - vehicle
    - template
  type:
    main: string
- name: ignitionFail
  needs:
  - parents:
    - vehicle
    - template
- name: ignitionFailNoPower
  needs:
  - parents:
    - vehicle
    - template
  type:
    main: string
- name: is3D
  type:
    main: boolean
  description: |-
    Whenever this is set to `false`, the distance to the sound will not impact its volume. This parameter doesn't impact the sound directionality.
- name: loop
  description: |-
    Whether the sound should loop or not. The sound plays until turned off manually via Lua code or the emitter is destroyed.
  type:
    main: boolean
- name: master
  type:
    main: string
  description: |-
    Links the sound to a sound handling setting, which controls the volume of all sounds linked to it. This doesn't seems to be working properly, as some methods that call sounds will simply not take into account the current sound settings. You can find a relevant request about this issue on the #mod_portal channel of the official Discord [here](https://discord.com/channels/136501320340209664/1476602902607954043/1505634480939860119).
  values:
  - Primary
  - Ambient
  - Music
  - VehicleEngine
  default: Primary
- name: maxInstancesPerEmitter
  description: |-
    Specifies how many of this sound the sound emitter can play at the same time.
  type:
    main: integer
