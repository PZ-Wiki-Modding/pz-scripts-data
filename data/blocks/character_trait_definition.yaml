version: 1
name: character_trait_definition
description: Defines a character trait.
shouldHaveParent: true
parents:
- module
ID:
  canHaveSpace: true
parameters:
- name: IsProfessionTrait
  description: Defines whenever the trait is a profession trait or not, meaning it
    will only be available when selecting a profession.
  type:
    main: boolean
  required: true
- name: DisabledInMultiplayer
  description: If true, this trait will be disabled in multiplayer games.
  type:
    main: boolean
  required: true
- name: Cost
  description: The cost of the trait when selecting a character. Negative values give
    points, positive values take points.
  type:
    main: integer
  required: true
- name: CharacterTrait
  description: The registries trait definition ID to link to. see the wiki page about
    [registries](https://pzwiki.net/wiki/Registries) for more information.
  type:
    main: string
  required: true
- name: UIName
  description: The translation key for the trait's name. The translation key needs
    to be in the UI translation file. See the wiki page about [translations](https://pzwiki.net/wiki/Translations)
    for more information.
  type:
    main: string
  required: true
- name: UIDescription
  description: The translation key for the trait's description. The translation key
    needs to be in the UI translation file. See the wiki page about [translations](https://pzwiki.net/wiki/Translations)
    for more information.
  type:
    main: string
  required: true
- name: MutuallyExclusiveTraits
  description: A list of trait IDs that are mutually exclusive with this trait. If
    one is selected, the others cannot be selected.
  type:
    main: array
- name: XPBoosts
  description: |-
    A list of experience boosts granted by this trait. Each entry should contain a skill name and the corresponding boost amount.

    For example:
    ```cpp
    XPBoosts = Axe=1;Blunt=1,
    ```
  type:
    main: array
- name: GrantedRecipes
  description: A list of [craftRecipe](https://pzwiki.net/wiki/CraftRecipe) IDs that
    are granted to the character when this trait is selected.
  type:
    main: array
- name: Texture
  description: The path to the trait's icon texture. This should be a .png file located in the textures folder of your mod.
  type:
    main: string