version: 1
name: box
description: |-
  [box](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/box.html), [cylinder](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/cylinder.html) and [polygon](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/polygon.html) are used in [tileGeometry.txt](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/root-tilegeometry.html) to define the tile depth of a tile.

  You can find more information [here](https://pzwiki.net/wiki/Tile_depth).
shouldHaveParent: true
parents:
- tile
parameters:
- name: translate
  type: 
    main: array
    array:
      separator: x
      type: integer
- name: rotate
  type: 
    main: array
    array:
      separator: x
      type: integer
- name: min
  type: 
    main: array
    array:
      separator: x
      type: integer
- name: max
  type: 
    main: array
    array:
      separator: x
      type: integer