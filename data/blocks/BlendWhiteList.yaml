version: 1
name: BlendWhiteList
description: |-
  BlendWhiteList defines a whitelist for fluids that the fluid can be blended with, while BlendBlackList defines a blacklist. By default those blocks are set whitelist, but you can add one of the available parameters to indicate whenever the block is a whitelist or a blacklist.

  Fluids that are whitelisted/blacklisted can be identified either by their category via the use of a [categories](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/categories.html) child block, or by their name via the use of the [fluid](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/blendwhitelist.html#fluid) parameter.
shouldHaveParent: true
parents:
- fluid
parameters:
- name: whitelist
  description: Indicates whenever blending with other fluids is allowed.
  type:
    main: boolean
- name: blacklist
  description: Indicates whenever blending with other fluids is disallowed.
  type:
    main: boolean
- name: fluid
  description: |-
    A list of fluids.
  type:
    main: array
    array:
      separator: "/"
      type: string
- name: category
  description: |-
    Unclear what this is for since this is usually achieved with a [categories](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/categories.html) child block.
- name: filterType
  description: |-
    Just use [whitelist](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/blendwhitelist.html#whitelist) or [blacklist](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/blendwhitelist.html#blacklist).
  values:
    - whitelist