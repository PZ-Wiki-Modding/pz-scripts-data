version: 1
name: fixing
description: |-
  Defines how an item can be repaired or fixed.
shouldHaveParent: true
parents:
- module
ID:
  canHaveSpace: true
parameters:
- name: Fixer
  allowedDuplicate: true
- name: Require
  type:
    main: array
    array:
      separator: ";"
      type: block
      block:
        name: item
        fullType: true

- name: GlobalItem
  type:
    main: object
    object:
      keyValueSeparator: "="
      keyType: block
      pairsSeparator: ";"
      valueType: integer
      keyBlock:
        name: item
- name: ConditionModifier
  type:
    main: float
