version: 1
name: ROOT-Rules
description: |-
  The `Rules.txt` file is used in the [mapping tools](https://pzwiki.net/wiki/Mapping#Mapping_tools) to define new [BMP to TMX](https://pzwiki.net/wiki/BMP_to_TMX) conversion rules. You can store this file anywhere on your computer and you need to reference it in the BMP Tool settings.

  A reference image containing the exact pixel colors you need to use for your BMP can be found [here](https://github.com/Unofficial-PZ-Mapping-Discord/B42-Colors/tree/main).
shouldHaveParent: false
parents: []
isRoot: true
pattern:
- Rules\.txt$
parameters:
- name: version
  type:
    main: integer
  description: Version of the rules file. Should be 1 for now.
