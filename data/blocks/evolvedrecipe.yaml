version: 1
name: evolvedrecipe
description: |-
  Defines a dynamic recipe where items can be added in as ingredients in multiple steps. This is notably used to define soups, stews or beverages that can accept multiple combination of ingredients. Stats from each [items](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html) are added to the final product.

  For an item to be accepted in a specific evolvedrecipe, it needs to have the parameter [EvolvedRecipe](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-evolvedrecipe) which lists every evolved recipes it can be used in and in what quantity.

  For example:
  ```cpp
  evolvedrecipe Sandwich
  {
      BaseItem = Base.BreadSlices,
      MaxItems = 4,
      ResultItem = Base.Sandwich,
      Name = Make Sandwich,
      CanAddSpicesEmpty = true,
      AddIngredientIfCooked = true,
      Template = Sandwich,
      Cookable = true,
  }

  item Processedcheese
  {
      EvolvedRecipe = Sandwich:5;Burger:5;Hotdog:5;Rice:5;Pasta:5;Bread:5;Omelette:5;Toast:5,
      ...
  }
  ```
shouldHaveParent: true
parents:
- module
ID:
  canHaveSpace: true
parameters:
- name: AddIngredientIfCooked
  description: |-
    Whenever ingredients can be added even after the item has been cooked.
  type:
    main: boolean
- name: AddIngredientSound
  description: |-
    The [sound](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/sound.html) which will be played when an ingredient is added.

    If set to `AddItemInBeverage`, when the [ingredient](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html) has the [tag](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-tags) `base:wetbeverageingredient`, the sound will be changed to `AddWetItemInBeverage` but if not present, it will changed to `AddDryItemInBeverage`.
  type:
    main: block
    block:
      name: sound
  default: AddItemInBeverage # not set in the Java, but in the only place that uses it (ISAddItemInRecipe.lua)
- name: BaseItem
  description: |-
    The [item](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html) which will serve as the base for this recipe, that is the item which will be combined with the ingredients to create the [ResultItem](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/evolvedrecipe.html#resultitem).
  type:
    main: block
    block:
      name: item
      fullType: true
- name: CanAddSpicesEmpty
  description: |-
    If true, the [spices](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-spice) can be added to the [BaseItem](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/evolvedrecipe.html#baseitem) directly without any ingredients yet added.
  type:
    main: boolean
- name: Cookable
  description: |-
    If true, the [ResultItem](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/evolvedrecipe.html#resultitem) will be cookable.
  type:
    main: boolean
  values:
    - 'true'
- name: MaxItems
  description: |-
    The maximum number of ingredients which will be used in this recipe. Unique [spices](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-spice) on the other hand can be added infinitely.
  type:
    main: integer
  minimum: 1
- name: MinimumWater
  description: |-
    The minimum amount of water which must be present in the [BaseItem](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/evolvedrecipe.html#baseitem) for this recipe to be valid.
  type:
    main: float
  default: 0.0
- name: Name
  description: |-
    The translation key for the name of this recipe which will be retrieved from the [Recipes.json](https://pz-wiki-modding.github.io/PZ-API-Docs/translations/translation_files.html#recipes) file.
  type:
    main: string
- name: ResultItem
  type:
    main: block
    block:
      name: item
      fullType: true
- name: Template
  description: |-
    Whenever an item uses this recipe via the [EvolvedRecipe](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-evolvedrecipe) parameter, and links to the recipe of the `Template`, that ingredient will be added to both the template and this evolved recipe. This allows you to make variants of the same evolved recipe with different containers, for example for beverages, where the same recipe can be used for a cup, a bottle or a jar.

    It will not copy the parameters of the template recipe however, only the ingredients.
  type:
    main: block
    block:
      name: evolvedrecipe